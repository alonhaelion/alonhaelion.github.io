<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PlayMax</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0f1220; color: #e7e9f3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6; padding: 32px;
  }
  .card { max-width: 560px; width: 100%; }
  h1 { font-size: 2.4rem; margin: 0 0 4px; letter-spacing: -0.02em; }
  .tag { color: #9aa0c0; margin: 0 0 28px; font-size: 1.05rem; }
  h2 { font-size: 1.15rem; margin: 28px 0 6px; }
  p { margin: 0 0 14px; color: #c7cbe6; }
  a { color: #8ea2ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .links { margin-top: 28px; padding-top: 20px; border-top: 1px solid #262a44; font-size: 0.95rem; }
  .links a { display: inline-block; margin-right: 18px; }
</style>
</head>
<body>
  <div class="card">
    <h1>PlayMax</h1>
    <p class="tag">Casual mobile games, made with care.</p>

    <h2>JigaBlox</h2>
    <p>A relaxing block-puzzle game — part Tangram, part Tetris. Drag the pieces
       to cover the board, level by level. Available on the App Store.</p>

    <h2>Contact</h2>
    <p>Questions, feedback, or support: <a href="mailto:playmaxwingames@gmail.com">playmaxwingames@gmail.com</a></p>

    <div class="links">
      <a href="https://alonhaelion.github.io/jigablox-privacy/privacy-policy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
